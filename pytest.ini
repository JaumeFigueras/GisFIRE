; Core project test config (project venv, .venv).
; Runs the data-model / providers / apps / API tests against PostgreSQL.
; The QGIS plugin has its OWN config at qgis_plugin/pytest.ini and is NOT
; collected here (testpaths is limited to test/), so this suite never imports
; qgis / PyQt6.
[pytest]
minversion = 8.0
pythonpath = .
testpaths = test
; coverage on by default (needs pytest-cov, in requirements/dev.txt)
addopts = -ra --cov=src --cov-report=term-missing
