; QGIS plugins test config (QGIS venv, --system-site-packages).
; Run via `make test-qgis`, which sets PYTHONPATH=/usr/share/qgis/python (PyQGIS)
; and QT_QPA_PLATFORM=offscreen. pytest-qgis auto-registers its fixtures
; (qgis_app, qgis_iface, ...) when installed.
[pytest]
minversion = 8.0
; the container dir on sys.path so each plugin imports top-level, exactly as
; QGIS loads it (e.g. `import gisfire_thunderstorm`).
pythonpath = .
; importlib mode avoids basename clashes across per-plugin test folders.
testpaths = test
addopts = -ra --import-mode=importlib
    --cov=gisfire_thunderstorm
    --cov=gisfire_minimum_geometric_cover
    --cov=gisfire_helicopter_routes
    --cov-report=term-missing
