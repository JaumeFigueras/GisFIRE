# Alembic configuration for GisFIRE.
#
# The database URL is deliberately NOT set here: it is built in alembic/env.py
# from the GISFIRE_DB_* environment variables (see .env.example), so no
# credentials ever live in a tracked file.

[alembic]
script_location = alembic

# Import `src.*` when running `alembic` from the repository root.
prepend_sys_path = .
path_separator = os

# Migration filenames get a UTC timestamp prefix so they sort chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]
# No formatting hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
